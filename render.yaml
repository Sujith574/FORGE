# Render deployment configuration for FORGE (MongoDB)
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: forge
    runtime: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/users/me
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
