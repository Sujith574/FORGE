# Render deployment configuration for FORGE
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: forge
    runtime: node
    region: singapore   # Change to: oregon, frankfurt, ohio, virginia as needed
    plan: free           # Change to: starter, standard, etc. for production
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/users/me
    envVars:
      - key: NODE_ENV
        value: production
      - key: GROQ_API_KEY
        sync: false        # Set manually in Render dashboard
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
